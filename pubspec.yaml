name: remote_content_explorer
description: "A new Flutter project."
version: 0.0.1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  retrofit: ^4.9.2
  riverpod: ^3.2.1

dev_dependencies:
  build_runner: ^2.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.1
  mocktail: ^1.0.5
  retrofit_generator: ^10.2.5

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins.ttf

  assets:
    - assets/icons/
    - assets/images/
