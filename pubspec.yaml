name: remote_content_explorer
description: "A new Flutter project."
version: 0.0.1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.1
  retrofit: ^4.9.2
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

dev_dependencies:
  build_runner: ^2.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  retrofit_generator: ^10.2.5
  riverpod_generator: ^4.0.4-dev.1
flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins.ttf

  assets:
    - assets/icons/
    - assets/images/
